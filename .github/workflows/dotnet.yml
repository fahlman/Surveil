name: CI

on:
  push:
    paths:
      - "Surveil.Core/**"
      - "Surveil.Core.Tests/**"
      - ".github/workflows/dotnet.yml"
  pull_request:
    paths:
      - "Surveil.Core/**"
      - "Surveil.Core.Tests/**"
      - ".github/workflows/dotnet.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test Surveil.Core.Tests/Surveil.Core.Tests.csproj --configuration Release
