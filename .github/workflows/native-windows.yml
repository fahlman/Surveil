name: Native Windows core

on:
  push:
    paths:
      - "native-windows/**"
      - ".github/workflows/native-windows.yml"
  pull_request:
    paths:
      - "native-windows/**"
      - ".github/workflows/native-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test native-windows/Surveil.Core.Tests/Surveil.Core.Tests.csproj --configuration Release
