<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surveil</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <h1>Surveil</h1>
        <div class="header-actions">
          <button id="import-btn" class="secondary" type="button">Import…</button>
          <button id="export-btn" class="secondary" type="button">Export…</button>
          <button id="add-building" type="button">Add Building</button>
          <input id="import-file" type="file" accept="application/json,.json" hidden />
        </div>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="scope-head">
          <span>Buildings</span>
          <span id="config-status" class="inline-status"></span>
        </div>
        <div id="building-list" class="building-tree"></div>
        <form id="building-editor" class="inline-editor" hidden>
          <div class="editor-head">
            <h2 id="editor-title">Edit Building</h2>
            <button id="cancel-edit" class="link" type="button">Cancel</button>
          </div>
          <label>Name <input id="building-name" type="text" required /></label>
          <div class="ranges-editor">
            <div class="ranges-head">Named private network ranges</div>
            <div id="range-list"></div>
            <button id="add-range" class="link" type="button">+ Add range</button>
          </div>
          <div class="form-actions">
            <button id="save-building" type="submit">Save Changes</button>
            <button id="delete-building" class="link-danger" type="button">Delete Building</button>
          </div>
          <p id="editor-status" class="status"></p>
        </form>
      </div>

      <div class="controls card">
        <label>Port <input id="port" type="number" value="80" min="1" max="65535" /></label>
        <button id="scan-btn">Scan</button>
        <button id="wsd-btn" class="secondary" type="button">Quick scan (WS-Discovery)</button>
      </div>

      <div id="wsd-result" hidden>
        <p id="wsd-verdict" class="summary"></p>
        <table id="wsd-table" hidden>
          <thead>
            <tr><th>Building</th><th>IP</th><th>ONVIF service</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="progress-wrap" hidden>
        <div class="progress-track"><div id="progress-bar"></div></div>
        <p id="progress-text" class="status"></p>
      </div>

      <p id="summary" class="summary"></p>

      <table id="results" hidden>
        <thead>
          <tr>
            <th>Status</th>
            <th>Building</th>
            <th>IP</th>
            <th>Last seen</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>

    <script src="main.js"></script>
  </body>
</html>
